<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex" />
  <title>Redirecionando para o NEXLAB</title>
  <style>
    html,body{height:100%;margin:0;font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f5f6f8;color:#0e1f3d}
    body{display:grid;place-items:center}
    main{max-width:34rem;padding:2rem;text-align:center}
    h1{font-size:1.25rem;margin:0 0 .75rem}
    p{margin:0;line-height:1.55;color:#475569}
  </style>
  <script>
    (function () {
      var path = window.location.pathname || "/";
      var parts = path.split("/").filter(Boolean);
      var githubPages = /\.github\.io$/i.test(window.location.hostname);
      var basePath = githubPages && parts.length > 0 ? "/" + parts[0] + "/" : "/";
      var target = basePath + "index.html" + (window.location.search || "") + (window.location.hash || "");
      var current = path.replace(/\/+$/, "/");
      var targetPath = (basePath + "index.html").replace(/\/+$/, "/");
      if (current !== targetPath) {
        window.location.replace(target);
      }
    })();
  </script>
</head>
<body>
  <main>
    <h1>Abrindo o NEXLAB</h1>
    <p>O endereço solicitado não corresponde a um arquivo estático. Redirecionando para a entrada do aplicativo.</p>
  </main>
</body>
</html>

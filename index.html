    <title>NEXLAB Beta 0.26.22</title>
    <style id="nexlab-startup-shell-style">
      html,body,#root{min-height:100%;margin:0}body{background:#f5f6f8;color:#10233f;font-family:Arial,sans-serif}
      .nexlab-startup-shell{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:28px;box-sizing:border-box;text-align:center}
      .nexlab-startup-card{width:min(360px,100%);display:grid;justify-items:center;gap:14px}
      .nexlab-startup-logo{width:112px;height:112px;object-fit:contain;border-radius:26px}
      .nexlab-startup-title{margin:0;font-size:22px}.nexlab-startup-status{margin:0;color:#52637b;line-height:1.5}
      .nexlab-startup-spinner{width:30px;height:30px;border:3px solid #d8e0eb;border-top-color:#0b2a63;border-radius:50%;animation:nexlabStartupSpin .8s linear infinite}
      .nexlab-startup-recovery{display:none;margin-top:4px;padding:14px;border:1px solid #d9e1eb;border-radius:14px;background:#fff}
      .nexlab-startup-recovery.is-visible{display:block}.nexlab-startup-retry{display:inline-block;margin-top:10px;padding:10px 16px;border-radius:10px;background:#0b2a63;color:#fff;text-decoration:none;font-weight:700}
      @keyframes nexlabStartupSpin{to{transform:rotate(360deg)}}@media(prefers-reduced-motion:reduce){.nexlab-startup-spinner{animation:none}}
    </style>
    <!-- NEXLAB Beta 0.26.22: clareza visual, campos consistentes e ajuda contextual por módulo. -->

            <p>O NEXLAB interrompeu a espera para não permanecer travado. Tente novamente; seus dados não serão apagados.</p>
